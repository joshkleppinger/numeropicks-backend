services:
  - type: web
    name: numeropicks-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NUMERO_DATA_DIR
        value: /data/numero
    disk:
      name: numero-data
      mountPath: /data/numero
      sizeGB: 1
